steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/mata-repo/mata-telegram-bot:$COMMIT_SHA', '-f', 'clients/telegram_bot/Dockerfile', 'clients/telegram_bot/']

  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/mata-repo/mata-telegram-bot:$COMMIT_SHA']

  # 3. Deploy identical image to the existing Terraform-managed Cloud Run service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mata-telegram-bot'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/mata-repo/mata-telegram-bot:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'

options:
  logging: CLOUD_LOGGING_ONLY
